name: Lifebits CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore backend solution
        run: dotnet restore backend/Lifebits.Api/Lifebits.Api.sln

      - name: Run backend tests
        run: dotnet test backend/Lifebits.Api/Lifebits.Api.sln --configuration Release --no-restore

  frontend-tests:
    name: Frontend tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend/lifebits-web

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/lifebits-web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build

      - name: Run frontend tests
        run: npm run test
